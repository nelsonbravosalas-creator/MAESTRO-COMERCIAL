<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 88" width="210" height="88">
  <!-- NβyB logotype -->
  <text x="6" y="38" font-family="'Arial Black', Impact, 'sans-serif'" font-size="33" font-weight="900" fill="#111111" letter-spacing="-1">N&#946;yB</text>

  <!-- Stylized technician figure (person + clock tool) -->
